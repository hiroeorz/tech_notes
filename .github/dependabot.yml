version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ruby"
    groups:
      patches:
        update-types:
          - "patch"
        labels:
          - "auto-merge"
          - "dependencies"
          - "ruby"
