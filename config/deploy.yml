# Name of your application. Used to uniquely configure containers.
service: tech_notes

# Name of the container image (use your-user/app-name on external registries).
image: <%= ENV.fetch("IMAGE") %>

# Deploy to these servers.
servers:
  web:
    - <%= ENV.fetch("SERVER_IP") %>
  # job:
  #   hosts:
  #     - 192.168.0.1
  #   cmd: bin/jobs

# Enable SSL auto certification via Let's Encrypt and allow for multiple apps on a single web server.
# If used with Cloudflare, set encryption mode in SSL/TLS setting to "Full" to enable CF-to-app encryption.
#
# Using an SSL proxy like this requires turning on config.assume_ssl and config.force_ssl in production.rb!
#
# Don't use this when deploying to multiple web servers (then you have to terminate SSL at your load balancer).
proxy:
  ssl: true
  host: <%= ENV.fetch("APP_HOST") %>
  healthcheck:
    path: /up
    interval: 10
    timeout: 5

# Where you keep your container images.
registry:
  # Use Docker Hub
  server: docker.io

  # Docker Hub username for the image repository.
  username: <%= ENV.fetch("REGISTRY_USERNAME") %>

  # Docker Hub access token. Never use your account password here.
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - CLOUDFLARE_R2_ACCESS_KEY_ID
    - CLOUDFLARE_R2_SECRET_ACCESS_KEY
    - CLOUDFLARE_R2_BUCKET
    - CLOUDFLARE_R2_ENDPOINT
    - ACTIVE_STORAGE_PUBLIC_BASE_URL
    - CLOUDFLARE_ACCOUNT_ID
    - CLOUDFLARE_AI_API_TOKEN
    - CLOUDFLARE_AI_MODEL
    - CLOUDFLARE_AI_TIMEOUT_SECONDS
    - CLOUDFLARE_AI_MAX_TOKENS
    - GOOGLE_CLOUD_API_KEY
    - CLOUDFLARE_R2_AUDIO_BUCKET
    - GOOGLE_SITE_VERIFICATION
    - TURNSTILE_SITE_KEY
    - TURNSTILE_SECRET_KEY
    - ADMIN_EMAIL
    - ADMIN_PASSWORD
  clear:
    RAILS_ENV: production

    # Run the Solid Queue Supervisor inside the web server's Puma process to do jobs.
    # When you start using multiple servers, you should split out job processing to a dedicated machine.
    SOLID_QUEUE_IN_PUMA: true

    # Set number of processes dedicated to Solid Queue (default: 1)
    #JOB_CONCURRENCY: 1

    # Set number of cores available to the application on each server (default: 1).
    #WEB_CONCURRENCY: 1
    
    # Reach the database accessory on the internal Kamal Docker network.
    DB_HOST: tech_notes-db
    POSTGRES_DB: tech_notes_production
    APP_HOST: <%= ENV.fetch("APP_HOST") %>
    POSTGRES_USER: <%= ENV.fetch("POSTGRES_USER") %>
    POSTGRES_DB_CACHE: tech_notes_production_cache
    POSTGRES_DB_QUEUE: tech_notes_production_queue
    POSTGRES_DB_CABLE: tech_notes_production_cable

    # Log everything from Rails
    # RAILS_LOG_LEVEL: debug

# Aliases are triggered with "bin/kamal <alias>". You can overwrite arguments on invocation:
# "bin/kamal logs -r job" will tail logs from the first server in the job section.
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Bridge fingerprinted assets, like JS and CSS, between versions to avoid
# hitting 404 on in-flight requests. Combines all files from new and old
# version inside the asset_path.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

  # # Build image via remote server (useful for faster amd64 builds on arm64 computers)
  # remote: ssh://docker@docker-builder-server
  #
  # # Pass arguments and secrets to the Docker build process
  # args:
  #   RUBY_VERSION: 4.0.5
  # secrets:
  #   - GITHUB_TOKEN
  #   - RAILS_MASTER_KEY

# Use SSH_USER env var for SSH deployment user.
ssh:
  user: <%= ENV.fetch("SSH_USER") %>

# Accessory services (secrets come from .kamal/secrets).
accessories:
  db:
    image: postgres:16-alpine
    host: <%= ENV.fetch("SERVER_IP") %>
    # Bind to the host loopback so the database is not exposed to the public internet.
    # The web container reaches the accessory via the internal Kamal Docker network using DB_HOST=tech_notes-db.
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: tech_notes_production
        POSTGRES_USER: <%= ENV.fetch("POSTGRES_USER") %>
      secret:
        - POSTGRES_PASSWORD
    # Initialise the Solid Cache / Queue / Cable logical databases on first boot.
    files:
      - config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    # Persist PostgreSQL data to a host directory managed by Kamal.
    directories:
      - postgres-data:/var/lib/postgresql/data
